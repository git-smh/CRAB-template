<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Your annotation project title</title>
    <script src="https://unpkg.com/jspsych"></script>
    <script src="jspsych/crab.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/jspsych/css/jspsych.css"/>
  </head>

  <body></body>
  <script>
    const jsPsych = initJsPsych();

    const trial = {
      type: jsPsychCrab,
      
      // (optional)
      // stylesheet: "yours-here.css",
      
      <!-- for multi-label mode, if dataset already comes with labels, they should be in arrays, i.e. "label": [0] -->
      dataset: [
        {"id": 0, "text": "text 0"},
        {"id": 1, "text": "test 1", "label": 0},
      ],
      
      labels: ["label0", "label1"],

      // (optional, false by default)
      // multi_labels: true,

      // (optional)
      // guidelines: "Please read and adhere to these guidelines:<ol><li>They can be styled with HTML.</li></ol>",
      
      // (optional)
      /* keyboard_shortcuts: {
        all_items: "",
        guidelines: "",
        keyboard_shortcuts: "",
        rapid_mode: "",
        prev: "",
        next: "",
        save: "",
        labels: ["", "", ...],
      }, */
          
      owner: "you",
          
      repo: "your-repo",

      // (optional) 
      // workflow: "yours-here.yml",
    };

    jsPsych.run([trial]);
  </script>
</html>
